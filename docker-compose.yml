services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentics
      POSTGRES_PASSWORD: agentics_local
      POSTGRES_DB: agentics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentics"]
      interval: 3s
      timeout: 3s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      # Override so Docker stack uses local postgres and chroma
      DATABASE_URL: postgresql://agentics:agentics_local@postgres:5432/agentics
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      # Pass through from .env (backup if env_file not loaded)
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      chroma: { condition: service_started }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: {}
  chroma_data: {}
